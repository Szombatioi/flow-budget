services:
  flowbudget:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5288:5288"
    volumes:
      # Persists the SQLite database across container restarts
      - flowbudget-data:/app/Data
    environment:
      - ASPNETCORE_URLS=https://+:5288
      - ASPNETCORE_ENVIRONMENT=Production
      # Point Kestrel at the self-signed cert baked into the image.
      # To use your own cert, mount it as a volume and override these two vars.
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/app/certs/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=FlowBudget_Cert!
    restart: unless-stopped

volumes:
  flowbudget-data:
