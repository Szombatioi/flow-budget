version: '3.8'

services:
  sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: flow_budget_db
    environment:
      - ACCEPT_EULA=1
      - MSSQL_SA_PASSWORD=Password123
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped

volumes:
  sqldata:
